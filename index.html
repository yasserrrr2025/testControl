    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                  .then((reg) => {
                    // كشف تحديثات SW جديدة
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // إظهار بانر تحديث أنيق
                                showUpdateBanner();
                            }
                        });
                    });
                  })
                  .catch(err => console.warn('SW failed:', err));
            });
        }

        function showUpdateBanner() {
            const banner = document.createElement('div');
            banner.id = 'update-banner';
            banner.innerHTML = `
              <div style="
                position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
                background:#1e40af; color:white; padding:14px 24px;
                border-radius:999px; font-family:'Tajawal',sans-serif; font-weight:800;
                font-size:14px; direction:rtl; z-index:9999; white-space:nowrap;
                box-shadow:0 8px 32px rgba(37,99,235,0.5); border:1px solid rgba(255,255,255,0.15);
                display:flex; align-items:center; gap:12px; cursor:pointer;
                animation: slideUp2 0.4s ease-out;
              " onclick="window.location.reload()">
                <span style="font-size:18px">⚡</span>
                <span>يوجد تحديث جديد — اضغط للتحديث</span>
                <span style="background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:999px; font-size:12px">تحديث</span>
              </div>
              <style>@keyframes slideUp2 { from{transform:translate(-50%,20px);opacity:0} to{transform:translate(-50%,0);opacity:1} }</style>
            `;
            document.body.appendChild(banner);
            // إخفاء البانر تلقائياً بعد 15 ثانية
            setTimeout(() => banner.remove(), 15000);
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
